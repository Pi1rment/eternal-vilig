<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal Vigil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0f;
            color: #e8d5a3;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #castle {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        #title {
            font-size: 28px;
            color: #ff9900;
            text-shadow: 0 0 20px #ff6600;
            letter-spacing: 4px;
        }
        #counter {
            font-size: 14px;
            color: #a08060;
            margin-top: 5px;
        }
        #checkin-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #ff6600;
            color: #000;
            border: none;
            font-size: 16px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 20px #ff4400;
        }
        #checkin-btn:hover { background: #ff9900; }
    </style>
</head>
<body>
    <div id="castle">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="ui">
        <div id="title">⚔️ THE ETERNAL VIGIL ⚔️</div>
        <div id="counter">Torches burning: <span id="alive">0</span></div>
        <button id="checkin-btn" onclick="checkin()">🔥 CONFIRM YOUR WATCH</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const players = [
            {name: "You", alive: true, x: 0.45, y: 0.6},
            {name: "Warrior_1", alive: true, x: 0.2, y: 0.4},
            {name: "Guard_2", alive: false, x: 0.7, y: 0.35},
            {name: "Knight_3", alive: true, x: 0.8, y: 0.65},
            {name: "Shadow_4", alive: false, x: 0.35, y: 0.75},
            {name: "Sentinel_5", alive: true, x: 0.6, y: 0.25},
        ];

        let time = 0;

        function drawBackground() {
            // Sky
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#05050f');
            skyGrad.addColorStop(1, '#1a1008');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = 'white';
            for(let i = 0; i < 100; i++) {
                const x = (Math.sin(i * 567.3) * 0.5 + 0.5) * canvas.width;
                const y = (Math.sin(i * 234.7) * 0.5 + 0.5) * canvas.height * 0.6;
                const size = Math.sin(time * 0.05 + i) * 0.5 + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Moon
            ctx.fillStyle = '#fffacd';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#fffacd';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, canvas.height * 0.15, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawCastle() {
            const w = canvas.width;
            const h = canvas.height;

            // Castle wall
            ctx.fillStyle = '#2a2018';
            ctx.fillRect(0, h * 0.5, w, h * 0.5);
 // Castle battlements (top of wall)
            ctx.fillStyle = '#1e1810';
            const battlementWidth = 60;
            const battlementHeight = 50;
            const gap = 40;
            for(let x = 0; x < w; x += battlementWidth + gap) {
                ctx.fillRect(x, h * 0.5 - battlementHeight, battlementWidth, battlementHeight);
            }

            // Wall texture lines
            ctx.strokeStyle = '#1a1208';
            ctx.lineWidth = 2;
            for(let y = h * 0.5; y < h; y += 30) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }
            for(let x = 0; x < w; x += 60) {
                ctx.beginPath();
                ctx.moveTo(x, h * 0.5);
                ctx.lineTo(x, h);
                ctx.stroke();
            }
        }

        function drawTorch(x, y, alive) {
            // Torch stick
            ctx.fillStyle = '#5c3a1e';
            ctx.fillRect(x - 4, y, 8, 30);

            if(alive) {
                // Flame flicker
                const flicker = Math.sin(time * 0.3 + x) * 3;
                const flicker2 = Math.cos(time * 0.2 + y) * 2;

                // Glow
                const glow = ctx.createRadialGradient(x, y, 0, x, y, 60);
                glow.addColorStop(0, 'rgba(255, 150, 0, 0.3)');
                glow.addColorStop(1, 'rgba(255, 50, 0, 0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, 60, 0, Math.PI * 2);
                ctx.fill();

                // Flame
                ctx.fillStyle = '#ff9900';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff6600';
                ctx.beginPath();
                ctx.ellipse(x + flicker, y - 15 + flicker2, 8, 15, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.ellipse(x + flicker * 0.5, y - 10, 4, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                // Dead torch - smoke
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(x, y - 5, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawPlayers() {
            let alive = 0;
            players.forEach(p => {
                const x = p.x * canvas.width;
                const y = p.y * canvas.height;
                if(p.alive) alive++;
                drawTorch(x, y, p.alive);

                // Player name
                ctx.fillStyle = p.alive ? '#e8d5a3' : '#444';
                ctx.font = '11px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, x, y + 45);

                // Ghost if dead
                if(!p.alive) {
                    ctx.fillStyle = 'rgba(150, 150, 255, 0.3)';
                    ctx.font = '24px Georgia';
                    ctx.fillText('👻', x, y - 30);
                }
            });
            document.getElementById('alive').textContent = alive;
        }

        function animate() {
            time++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawCastle();
            drawPlayers();
            requestAnimationFrame(animate);
        }

        function checkin() {
            alert('✅ Watch confirmed! Your torch burns for another night.');
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
